<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Mohamed Stour</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #080c14;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #4f7dff, #00e5a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }
        h1 { font-size: 1.4rem; color: #8899bb; margin: 16px 0 8px; font-weight: 600; }
        p  { color: #5a6580; margin-bottom: 32px; }
        a  {
            display: inline-flex;
            padding: 12px 24px;
            background: linear-gradient(135deg, #4f7dff, #3a63e8);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(79,125,255,0.4);
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.88; }
    </style>
</head>
<body>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or was moved.</p>
    <a href="process.html">← Back to Shop</a>
</body>
</html>
