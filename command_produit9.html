<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung Galaxy Book — Mohamed Stour</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="product.css">
    <script src="product.js" defer></script>
</head>
<body>

    <nav class="top-nav">
        <a href="../process.html" class="back-link">← Back to shop</a>
        <span class="nav-brand">Mohamed Stour</span>
    </nav>

    <div class="product-page">

        <!-- Left: Image -->
        <div class="product-image-wrap">
            <img src="../IMAGES/laptop_samsung.jpeg" alt="Samsung Galaxy Book">
        </div>

        <!-- Right: Details + Order form -->
        <div class="product-detail">
            <p class="product-category">💻 PCs</p>
            <h1>Samsung Galaxy Book</h1>

            <div class="product-price-block">
                <span class="price-main">115,000 DA</span>
                
            </div>

            <p class="product-desc">Samsung Galaxy Book3 with Intel Evo platform, AMOLED display, and seamless Galaxy ecosystem integration.</p>

            <!-- Hidden product meta for JS -->
            <input type="hidden" id="product-name" value="Samsung Galaxy Book">
            <input type="hidden" id="product-id"   value="prod9">

            <!-- Order form -->
            <form class="order-form" id="order-form" novalidate>
                <h2>🛒 Order Now</h2>

                <div class="form-group">
                    <label for="o-name">Full name</label>
                    <input id="o-name" type="text" placeholder="Your full name" required>
                </div>

                <div class="row-2">
                    <div class="form-group">
                        <label for="o-phone">Phone</label>
                        <input id="o-phone" type="text" placeholder="05XXXXXXXX" required>
                    </div>
                    <div class="form-group">
                        <label for="o-qty">Quantity</label>
                        <input id="o-qty" type="number" value="1" min="1" max="99" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="o-address">Delivery address</label>
                    <input id="o-address" type="text" placeholder="Street, city, district" required>
                </div>

                <div class="form-group">
                    <label for="o-wilaya">Province (Wilaya)</label>
                    <select id="o-wilaya" required>

                    <option value="">Select Province</option>
                    <option value="Adrar">01 - Adrar</option>
                    <option value="Chlef">02 - Chlef</option>
                    <option value="Laghouat">03 - Laghouat</option>
                    <option value="Oum El Bouaghi">04 - Oum El Bouaghi</option>
                    <option value="Batna">05 - Batna</option>
                    <option value="Bejaia">06 - Bejaia</option>
                    <option value="Biskra">07 - Biskra</option>
                    <option value="Bechar">08 - Bechar</option>
                    <option value="Blida">09 - Blida</option>
                    <option value="Bouira">10 - Bouira</option>
                    <option value="Tamanrasset">11 - Tamanrasset</option>
                    <option value="Tebessa">12 - Tebessa</option>
                    <option value="Tlemcen">13 - Tlemcen</option>
                    <option value="Tiaret">14 - Tiaret</option>
                    <option value="Tizi Ouzou">15 - Tizi Ouzou</option>
                    <option value="Algiers">16 - Algiers</option>
                    <option value="Djelfa">17 - Djelfa</option>
                    <option value="Jijel">18 - Jijel</option>
                    <option value="Setif">19 - Sétif</option>
                    <option value="Saida">20 - Saïda</option>
                    <option value="Skikda">21 - Skikda</option>
                    <option value="Sidi Bel Abbes">22 - Sidi Bel Abbès</option>
                    <option value="Annaba">23 - Annaba</option>
                    <option value="Guelma">24 - Guelma</option>
                    <option value="Constantine">25 - Constantine</option>
                    <option value="Medea">26 - Médéa</option>
                    <option value="Mostaganem">27 - Mostaganem</option>
                    <option value="MSila">28 - M'Sila</option>
                    <option value="Mascara">29 - Mascara</option>
                    <option value="Ouargla">30 - Ouargla</option>
                    <option value="Oran">31 - Oran</option>
                    <option value="El Bayadh">32 - El Bayadh</option>
                    <option value="Illizi">33 - Illizi</option>
                    <option value="Bordj Bou Arreridj">34 - Bordj Bou Arréridj</option>
                    <option value="Boumerdes">35 - Boumerdès</option>
                    <option value="El Tarf">36 - El Tarf</option>
                    <option value="Tindouf">37 - Tindouf</option>
                    <option value="Tissemsilt">38 - Tissemsilt</option>
                    <option value="El Oued">39 - El Oued</option>
                    <option value="Khenchela">40 - Khenchela</option>
                    <option value="Souk Ahras">41 - Souk Ahras</option>
                    <option value="Tipaza">42 - Tipaza</option>
                    <option value="Mila">43 - Mila</option>
                    <option value="Ain Defla">44 - Aïn Defla</option>
                    <option value="Naama">45 - Naâma</option>
                    <option value="Ain Temouchent">46 - Aïn Témouchent</option>
                    <option value="Ghardaia">47 - Ghardaïa</option>
                    <option value="Relizane">48 - Relizane</option>
                    <option value="Timimoun">49 - Timimoun</option>
                    <option value="Bordj Badji Mokhtar">50 - Bordj Badji Mokhtar</option>
                    <option value="Ouled Djellal">51 - Ouled Djellal</option>
                    <option value="Beni Abbes">52 - Béni Abbès</option>
                    <option value="In Salah">53 - In Salah</option>
                    <option value="In Guezzam">54 - In Guezzam</option>
                    <option value="Touggourt">55 - Touggourt</option>
                    <option value="Djanet">56 - Djanet</option>
                    <option value="El Mghair">57 - El M'Ghair</option>
                    <option value="El Meniaa">58 - El Méniaâ</option>

                    </select>
                </div>

                <div class="form-group">
                    <label for="o-note">Note (optional)</label>
                    <textarea id="o-note" placeholder="Color preference, special request…"></textarea>
                </div>

                <button type="submit" class="submit-btn">Place Order</button>
            </form>
        </div>

    </div>

</body>
</html>
